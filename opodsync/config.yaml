name: oPODSync
version: "0.9.7alpha"
slug: opodsync
description: GPodder compatible sync server for podcasts
startup: application
boot: auto
url: "https://fossil.kd2.org/opodsync"
arch:
  - amd64
  - armv7
  - aarch64
